<!DOCTYPE html>
<html lang="en">

<head>
    <!-- page metadata -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minesweeper</title>

    <!-- game layout stylesheet -->
    <link rel="stylesheet" href="minesweeper.css" />

    <!-- game logic javascript -->
    <script src="minesweeper.js" defer></script>
</head>

<body>

    <!-- Wrapper used to center the game interface -->
    <div class="flex items-center gap-4 p-4 bg-base-100 rounded-box">

        
        <!-- Page container that holds the entire Minesweeper application -->
        <div class="page">

            <!-- Header -->
            <header class="header">
                <h1>Minesweeper</h1>
            </header>

            <!-- Main layout containing the board and side control panel -->
            <main class="layout">

                <!-- Game Board (grid tiles are dynamically generated by JavaScript)-->
                <section class="board-wrap">
                    <div id="board"></div>
                </section>

                <!-- Side panel containing game stats and difficulty settings -->
                <aside class="side-panel">

                    <!-- Game statistics -->
                    <section class="stats">
                        <label class="stats-label">Stats</label>

                        <!-- Total number of mines placed on the board -->
                        <div class="stat-box">
                            <span class="label">Mines</span>
                            <span id="mines-count" class="value">0</span>
                        </div>

                        <!-- Number of tiles that are safe (not mines) -->
                        <div class="stat-box">
                            <span class="label">Safe Tiles</span>
                            <span id="safe-count" class="value">0</span>
                        </div>

                        <!-- Total number of tiles on the board -->
                        <div class="stat-box">
                            <span class="label">Total Tiles</span>
                            <span id="total-count" class="value">0</span>
                        </div>

                        <!-- Number of safe tiles remaining to win the game -->
                        <div class="stat-box">
                            <span class="label">Remaining</span>
                            <span id="remaining-count" class="value">0</span>
                        </div>
                    </section>

                    <!-- Difficulty control panel -->
                    <section class="controls">
                        <label class="difficulty-label">Difficulty</label>

                        <div class="difficulty-dropdown" id="difficultyDropdown">
                            <div class="difficulty-selected" id="difficultySelected">Medium</div>

                            <!-- Available difficulty options -->
                            <ul class="difficulty-options" id="difficultyOptions">
                                <li data-value="easy">Easy</li>
                                <li data-value="medium">Medium</li>
                                <li data-value="hard">Hard</li>
                            </ul>
                        </div>

                        <!-- Start the game using the selected difficulty -->
                        <button onclick="applyDifficulty()">Start Game</button>
                    </section>
                </aside>
            </main>
        </div>
    </div>
</body>

</html>
